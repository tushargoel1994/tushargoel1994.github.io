# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"  # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# Site settings
title: "Tushar Goel Personal Blog"
subtitle: "Notes on corporate Strategy, Finance, and Governance"
name: "Tushar Goel"
description: "Leveraging Financial Modelling and Data Analysis to uncover Corporate Strategy and Governance"
url: "https://tushargoel1994.github.io"
baseurl: ""
repository: "tushargoel1994/tushargoel1994.github.io"

# Author profile (appears in sidebar)
author:
  name: "Tushar Goel"
  avatar: "/assets/images/avatar.png"
  bio: "Rice MBA \| IIT (BHU) \| CFA Level 2 \| Ex-Citi \| Investments, Strategy & Finance"
  location: "Houston, TX"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/tushargoel1994"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/tushargoel1994/"

# Reading & layout defaults
search: true
words_per_minute: 200
breadcrumbs: true

# Markdown & syntax
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Pagination
paginate: 10
paginate_path: /page:num/

# Default front matter for posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Categories & tags archive
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md